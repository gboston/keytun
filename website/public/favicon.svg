<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Minimal circle container with chevron and cursor -->
  <defs>
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffa07a"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
  </defs>
  <!-- Dark circle background -->
  <circle cx="64" cy="64" r="56" fill="#1d1d1f"/>
  <!-- Subtle ring border -->
  <circle cx="64" cy="64" r="56" fill="none" stroke="url(#ring-grad)" stroke-width="2.5" opacity="0.5"/>
  <!-- Chevron -->
  <path d="M38 42 L62 64 L38 86" stroke="#ffa07a" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Cursor lines -->
  <rect x="72" y="42" width="6" height="44" rx="3" fill="#6bcb77"/>
  <rect x="84" y="42" width="5" height="44" rx="2.5" fill="#6bcb77" opacity="0.4"/>
</svg>
