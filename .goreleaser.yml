# ABOUTME: GoReleaser configuration for building and distributing keytun.
# ABOUTME: Builds macOS (CGO) and Linux (static) binaries for arm64 + amd64, publishes a Homebrew cask.

version: 2

builds:
  - id: darwin
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/gboston/keytun/cmd.Version={{ .Version }}
    overrides:
      - goos: darwin
        goarch: amd64
        env:
          - CGO_ENABLED=1
          - CC=clang -arch x86_64
          - CXX=clang++ -arch x86_64
      - goos: darwin
        goarch: arm64
        env:
          - CGO_ENABLED=1
          - CC=clang -arch arm64
          - CXX=clang++ -arch arm64
  - id: linux
    env:
      - CGO_ENABLED=0
    goos:
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X github.com/gboston/keytun/cmd.Version={{ .Version }}

archives:
  - formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

homebrew_casks:
  - repository:
      owner: gboston
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/gboston/keytun"
    description: "Lightweight CLI tool that lets remote colleagues type into your terminal over a screenshare"
    license: "AGPL-3.0"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
